<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UI-Editor-Kit Mini-Inspector</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --line: #d6dbe7;
        --text: #1d2433;
        --muted: #5a6478;
        --accent: #0d7a6d;
        --accent-soft: #daf4f0;
        --sel: #ff9f1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, #eef2f9 0%, #f7f8fc 100%);
      }

      .page {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 14px;
        min-height: 100vh;
        padding: 14px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(26, 31, 44, 0.06);
        overflow: hidden;
      }

      .card h2 {
        margin: 0;
        padding: 12px 14px;
        font-size: 16px;
        border-bottom: 1px solid var(--line);
        background: #fafbfe;
      }

      .ui-wrap {
        padding: 14px;
      }

      .demo-root {
        border: 2px solid #7ea3ff;
        border-radius: 10px;
        padding: 12px;
        background: #fbfdff;
      }

      .demo-header,
      .demo-footer {
        padding: 10px;
        border-radius: 8px;
        background: #e9f2ff;
        margin-bottom: 10px;
      }

      .demo-content {
        padding: 14px;
        border-radius: 8px;
        border: 1px dashed #8bb4b8;
        background: #f0fbfa;
        margin-bottom: 10px;
      }

      [data-ui-inspector-id] {
        position: relative;
        cursor: pointer;
      }

      .ui-selected {
        outline: 3px solid var(--sel);
        outline-offset: 2px;
      }

      .side {
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 14px;
      }

      .list {
        margin: 0;
        padding: 0;
        list-style: none;
        max-height: 360px;
        overflow: auto;
      }

      .list button {
        width: 100%;
        text-align: left;
        border: 0;
        border-bottom: 1px solid var(--line);
        background: #fff;
        padding: 10px 12px;
        cursor: pointer;
      }

      .list button:hover {
        background: #f7f9ff;
      }

      .list button.active {
        background: var(--accent-soft);
        color: #0c4d45;
        font-weight: 600;
      }

      .meta {
        padding: 12px 14px;
      }

      .meta dl {
        margin: 0;
        display: grid;
        grid-template-columns: 130px 1fr;
        gap: 8px 10px;
      }

      .meta dt {
        color: var(--muted);
      }

      .meta dd {
        margin: 0;
        font-family: Consolas, "Courier New", monospace;
      }

      .hint {
        font-size: 13px;
        color: var(--muted);
        padding: 10px 14px;
        border-top: 1px solid var(--line);
      }

      @media (max-width: 900px) {
        .page {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h2>Demo-UI</h2>
        <div class="ui-wrap">
          <div
            class="demo-root"
            data-ui-inspector-id="demo.root"
            data-ui-editor-kind="frame"
            data-ui-editor-label="Demo Root"
            data-ui-editor-parent=""
            data-ui-editor-editable="true"
            data-ui-editor-ops="layout,move"
          >
            <div
              class="demo-header"
              data-ui-inspector-id="demo.header"
              data-ui-editor-kind="single"
              data-ui-editor-label="Demo Header"
              data-ui-editor-parent="demo.root"
              data-ui-editor-editable="true"
              data-ui-editor-ops="move,hide"
            >
              Header-Bereich
            </div>

            <div
              class="demo-content"
              data-ui-inspector-id="demo.content"
              data-ui-editor-kind="field"
              data-ui-editor-label="Demo Content"
              data-ui-editor-parent="demo.root"
              data-ui-editor-editable="true"
              data-ui-editor-ops="resize,layout"
            >
              Content-Bereich
            </div>

            <div
              class="demo-footer"
              data-ui-inspector-id="demo.footer"
              data-ui-editor-kind="single"
              data-ui-editor-label="Demo Footer"
              data-ui-editor-parent="demo.root"
              data-ui-editor-editable="false"
              data-ui-editor-ops="hide"
            >
              Footer-Bereich
            </div>
          </div>
        </div>
      </section>

      <section class="side">
        <section class="card">
          <h2>Elemente</h2>
          <ul id="inspectorList" class="list"></ul>
          <div class="hint">
            Auswahlregel: <code>closest("[data-ui-inspector-id]")</code>.
          </div>
        </section>

        <section class="card">
          <h2>Metadaten</h2>
          <div id="detail" class="meta">
            <p>Bitte ein Element aus der Liste oder aus der Demo-UI waehlen.</p>
          </div>
        </section>
      </section>
    </main>

    <script>
      (function () {
        const selector = "[data-ui-inspector-id]";
        const elements = Array.from(document.querySelectorAll(selector));
        const listEl = document.getElementById("inspectorList");
        const detailEl = document.getElementById("detail");
        const byId = new Map();
        let selectedId = "";

        elements.forEach((el) => {
          const id = el.getAttribute("data-ui-inspector-id") || "";
          if (id) {
            byId.set(id, el);
          }
        });

        function getMeta(el) {
          return {
            id: el.getAttribute("data-ui-inspector-id") || "",
            label: el.getAttribute("data-ui-editor-label") || "",
            kind: el.getAttribute("data-ui-editor-kind") || "",
            parent: el.getAttribute("data-ui-editor-parent") || "",
            editable: el.getAttribute("data-ui-editor-editable") || "",
            ops: el.getAttribute("data-ui-editor-ops") || "",
          };
        }

        function renderDetail(meta) {
          const dl = document.createElement("dl");
          const fields = [
            ["ID", meta.id],
            ["Label", meta.label],
            ["Kind", meta.kind],
            ["Parent", meta.parent],
            ["Editable", meta.editable],
            ["Ops", meta.ops],
          ];

          fields.forEach(([label, value]) => {
            const dt = document.createElement("dt");
            dt.textContent = label;
            const dd = document.createElement("dd");
            dd.textContent = value;
            dl.appendChild(dt);
            dl.appendChild(dd);
          });

          detailEl.replaceChildren(dl);
        }

        function updateVisualSelection() {
          elements.forEach((el) => el.classList.remove("ui-selected"));
          listEl.querySelectorAll("button").forEach((btn) => btn.classList.remove("active"));

          if (!selectedId) {
            return;
          }

          const selectedEl = byId.get(selectedId);
          if (selectedEl) {
            selectedEl.classList.add("ui-selected");
          }

          const selectedButton = listEl.querySelector(`button[data-target-id="${selectedId}"]`);
          if (selectedButton) {
            selectedButton.classList.add("active");
          }
        }

        function selectById(id) {
          const el = byId.get(id);
          if (!el) {
            return;
          }
          selectedId = id;
          updateVisualSelection();
          renderDetail(getMeta(el));
        }

        function renderList() {
          const frag = document.createDocumentFragment();

          elements.forEach((el) => {
            const meta = getMeta(el);
            const li = document.createElement("li");
            const btn = document.createElement("button");
            btn.type = "button";
            btn.setAttribute("data-target-id", meta.id);
            btn.textContent = `${meta.id} | ${meta.label}`;
            btn.addEventListener("click", function () {
              selectById(meta.id);
            });
            li.appendChild(btn);
            frag.appendChild(li);
          });

          listEl.innerHTML = "";
          listEl.appendChild(frag);
        }

        document.addEventListener("click", function (event) {
          const target = event.target.closest(selector);
          if (!target) {
            return;
          }
          const id = target.getAttribute("data-ui-inspector-id");
          if (id) {
            selectById(id);
          }
        });

        renderList();
        if (elements.length > 0) {
          const firstId = elements[0].getAttribute("data-ui-inspector-id");
          if (firstId) {
            selectById(firstId);
          }
        }
      })();
    </script>
  </body>
</html>
